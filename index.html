<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jashn-e-Noor Quiz - An interactive Islamic quiz app for children" />
    <meta name="theme-color" content="#1a1b4b" />
    <link rel="apple-touch-icon" href="/pwa-192x192.svg" />
    <title>Jashn-e-Noor Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background: #0f102b; }
        .app-loading {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: #0f102b;
          color: #FCD34D;
          font-family: 'Nunito', sans-serif;
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 4px solid rgba(252, 211, 77, 0.2);
          border-top-color: #FCD34D;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
      </style>
      <div class="app-loading">
        <div class="spinner"></div>
        <h2>Loading Quiz...</h2>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
